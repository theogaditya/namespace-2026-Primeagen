<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwarajDesk Monitor</title>
  <meta name="description" content="Real-time health monitoring dashboard for SwarajDesk infrastructure" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 style="display:flex;align-items:center;gap:10px;"><i data-lucide="shield-check"></i> SwarajDesk Monitor</h1>
        <span class="badge" id="lastRun">—</span>
      </div>
      <div class="header-right">
        <button class="btn btn-secondary" onclick="toggleTheme()" id="themeBtn"
          style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;padding:0;"><i
            data-lucide="sun" id="themeIcon" style="width:18px;height:18px;"></i></button>
        <button class="btn btn-primary" id="runNow" onclick="triggerCheck()"
          style="display:flex;align-items:center;gap:6px;"><i data-lucide="zap" style="width:16px;height:16px;"></i> Run
          Now</button>
        <button class="btn btn-secondary" id="sendAlertBtn" onclick="sendManualAlert()"
          style="display:flex;align-items:center;gap:6px;border-color:#f97316;color:#f97316;"><i data-lucide="bell" style="width:16px;height:16px;"></i> Send Alert</button>
        <button class="btn btn-secondary" onclick="exportCSV()" style="display:flex;align-items:center;gap:6px;"><i
            data-lucide="download" style="width:16px;height:16px;"></i> Export CSV</button>
        <div class="auto-refresh">
          <label><input type="checkbox" id="autoRefresh" checked /> Auto-refresh (1h15m)</label>
        </div>
      </div>
    </header>

    <!-- Global Loading Banner -->
    <div id="globalLoader"
      style="display:none;align-items:center;justify-content:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:24px;color:var(--text);font-weight:600;font-size:0.9rem;">
      <i data-lucide="loader-2" class="loading" style="width:16px;height:16px;color:var(--accent);"></i> Health Check
      Cycle in progress...
    </div>

    <!-- Email Alert Status Banner -->
    <div id="emailStatusBanner" style="display:none;align-items:center;gap:10px;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:0.85rem;font-weight:600;border:1px solid;"></div>

    <section class="summary-cards" id="summaryCards">
      <div class="card card-total">
        <div class="card-num" id="totalCount">—</div>
        <div class="card-label">Total Checks</div>
      </div>
      <div class="card card-up">
        <div class="card-num" id="upCount">—</div>
        <div class="card-label" style="display:flex;align-items:center;justify-content:center;gap:6px;"><i
            data-lucide="check-circle-2" style="width:14px;height:14px;color:var(--green)"></i> Up</div>
      </div>
      <div class="card card-down" style="cursor:pointer;" onclick="showAggregatedLogs('DOWN')">
        <div class="card-num" id="downCount">—</div>
        <div class="card-label" style="display:flex;align-items:center;justify-content:center;gap:6px;"><i
            data-lucide="x-circle" style="width:14px;height:14px;color:var(--red)"></i> Down</div>
      </div>
      <div class="card card-warn" style="cursor:pointer;" onclick="showAggregatedLogs('WARNING')">
        <div class="card-num" id="warnCount">—</div>
        <div class="card-label" style="display:flex;align-items:center;justify-content:center;gap:6px;"><i
            data-lucide="alert-triangle" style="width:14px;height:14px;color:var(--yellow)"></i> Warning</div>
      </div>
    </section>

    <!-- Filters -->
    <section class="filters">
      <select id="filterGroup" onchange="renderChecks()">
        <option value="all">All Groups</option>
        <option value="backend-health">Backend Health</option>
        <option value="feature-api">Feature API</option>
        <option value="frontend-api">Frontend API</option>
        <option value="database">Database</option>
        <option value="redis">Redis</option>
        <option value="s3">S3</option>
        <option value="ec2">EC2</option>
        <option value="dns-tls">DNS / TLS</option>
        <option value="ai-ml">AI/ML Models</option>
      </select>
      <select id="filterStatus" onchange="renderChecks()">
        <option value="all">All Statuses</option>
        <option value="UP">Up</option>
        <option value="DOWN">Down</option>
        <option value="WARNING">Warning</option>
      </select>
    </section>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="checks" onclick="switchTab('checks')">Checks</button>
      <button class="tab" data-tab="chart" onclick="switchTab('chart')">Response Times</button>
      <button class="tab" data-tab="incidents" onclick="switchTab('incidents')">Incidents</button>
      <button class="tab" data-tab="alerts" onclick="switchTab('alerts')">Alert History</button>
      <button class="tab" data-tab="logs" onclick="switchTab('logs')">EC2 Logs</button>
    </nav>

    <!-- Tab Content -->
    <main class="content">
      <div id="tab-checks" class="tab-panel active">
        <div class="checks-grid" id="checksGrid"></div>
      </div>
      <div id="tab-chart" class="tab-panel">
        <canvas id="responseChart" height="400"></canvas>
      </div>
      <div id="tab-incidents" class="tab-panel">
        <table class="data-table" id="incidentsTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Check</th>
              <th>Group</th>
              <th>Transition</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="tab-alerts" class="tab-panel">
        <table class="data-table" id="alertsTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Check</th>
              <th>Severity</th>
              <th>Type</th>
              <th>Subject</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="tab-logs" class="tab-panel">
        <div id="logsContainer" style="padding: 20px;"></div>
      </div>
    </main>
  </div>


  <!-- Check Detail Modal -->
  <div id="checkDetailModal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px;">
    <div
      style="background:var(--surface,#112240);border:1px solid var(--border,#1e3a5f);border-radius:12px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:24px;position:relative;">
      <button onclick="closeCheckDetail()"
        style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-dim,#8892b0);font-size:1.4rem;cursor:pointer;line-height:1;">✕</button>
      <div id="checkDetailContent"></div>
    </div>
  </div>

  <!-- Aggregated Logs Modal -->
  <div id="aggregatedLogModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px;">
    <div style="background:var(--surface,#112240);border:1px solid var(--border,#1e3a5f);border-radius:12px;width:100%;max-width:800px;height:85vh;display:flex;flex-direction:column;padding:24px;position:relative;">
      <button onclick="closeAggregatedLogs()" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-dim,#8892b0);font-size:1.4rem;cursor:pointer;line-height:1;">✕</button>
      <h3 id="aggregatedLogTitle" style="margin:0 0 16px 0;font-size:1.3rem;font-weight:600;padding-bottom:12px;border-bottom:1px solid var(--border,#1e3a5f);">Logs</h3>
      <div id="aggregatedLogContent" style="flex:1;overflow-y:auto;padding-right:8px;display:flex;flex-direction:column;gap:16px;"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>

</html>
