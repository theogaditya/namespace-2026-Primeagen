version: '3.8'

services:
  monitoring:
    build: .
    container_name: monitoring_service
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Map the local EC2 key directory if available, adjusting SSH_KEY path in .env
      - ../../ec2/.key:/ec2-keys:ro
    environment:
      - EC2_SSH_KEY=/ec2-keys/ec2-iit-pair
